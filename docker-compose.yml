# Local infrastructure for the RetailRec MLOps platform.
# Brings up: Postgres (MLflow backend + A/B log), Redis (Feast online + cache),
# MinIO (S3-compatible offline store + MLflow artifacts), and the MLflow server.
#
#   docker compose up -d         # start everything
#   docker compose ps            # check health
#   docker compose down          # stop (add -v to wipe volumes)
#
# UIs:  MLflow http://localhost:5000   |   MinIO console http://localhost:9001

services:
  postgres:
    image: postgres:16-alpine
    container_name: retailrec-postgres
    environment:
      POSTGRES_USER: retailrec
      POSTGRES_PASSWORD: retailrec
      POSTGRES_DB: retailrec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailrec"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: retailrec-redis
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: retailrec-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot job: create the artifact/offline buckets once MinIO is up.
  minio-setup:
    image: minio/mc:latest
    container_name: retailrec-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/retailrec &&
      mc mb --ignore-existing local/mlflow &&
      echo 'Buckets ready: retailrec, mlflow'
      "

  mlflow:
    build:
      context: ./docker
      dockerfile: mlflow.Dockerfile
    container_name: retailrec-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://retailrec:retailrec@postgres:5432/retailrec
      --artifacts-destination s3://mlflow/
      --serve-artifacts
    ports:
      - "5000:5000"

volumes:
  pgdata:
  redisdata:
  miniodata:
